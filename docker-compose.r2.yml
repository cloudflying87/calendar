# ============================================================================
# Stateless Docker Compose for Calendar Builder
# Uses Remote PostgreSQL + Cloudflare R2 CDN
# ============================================================================
#
# This configuration:
# - ✅ No local PostgreSQL database (uses remote at 172.16.29.5)
# - ✅ No static/media volumes (uses Cloudflare R2 CDN)
# - ✅ Stateless containers (can rebuild anytime without data loss)
# - ✅ Only logs volume for persistent logging
#
# To use this configuration:
#   1. Set up remote PostgreSQL database
#   2. Configure R2 credentials in .env.prod
#   3. Upload existing media files to R2 (upload_media_to_r2.py)
#   4. Replace docker-compose.yml with this file
#   5. Deploy: docker compose up -d
#
# ============================================================================

services:
  # No database service - using remote PostgreSQL at 172.16.29.5

  web:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    restart: always
    volumes:
      # Only logs volume - everything else on R2/remote
      - log_volume:/app/logs
    env_file:
      - ./.env.prod
    environment:
      - DATABASE_CHECK=1
      - DJANGO_SETTINGS_MODULE=config.settings.production
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    build: ./nginx
    restart: always
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cloudflare Tunnel service
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s


volumes:
  # Only log volume - no database, static, or media volumes
  log_volume:
    driver: local

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.32.0.0/16
