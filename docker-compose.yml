services:
  web:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    restart: always
    volumes:
      - log_volume:/app/logs
    env_file:
      - ./.env.prod
    environment:
      - DATABASE_CHECK=1
      - DJANGO_SETTINGS_MODULE=config.settings.production
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    build: ./nginx
    restart: always
    ports:
      - "16293:80"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  log_volume:
    driver: local

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.32.0.0/16
